<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initial Setup — {{ app_name }}</title>
    <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body class="page-login">
    <div class="login-card">
        <div class="login-card__header">
            <svg class="login-card__logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <h1 class="login-card__title">Welcome to {{ app_name }}</h1>
            <p class="login-card__subtitle">Create your administrator account to get started</p>
        </div>

        {% if error %}
        <div class="flash flash--error">
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/setup" class="login-form">
            <div class="form-group">
                <label for="email" class="form-group__label">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input{% if error %} form-input--error{% endif %}"
                    placeholder="admin@example.com"
                    required
                    autofocus
                />
            </div>
            <div class="form-group">
                <label for="full_name" class="form-group__label">Full name (optional)</label>
                <input
                    type="text"
                    id="full_name"
                    name="full_name"
                    class="form-input"
                    placeholder="Your name"
                />
            </div>
            <div class="form-group">
                <label for="password" class="form-group__label">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input{% if error %} form-input--error{% endif %}"
                    placeholder="At least 8 characters"
                    required
                    minlength="8"
                />
                <small>Must include uppercase, lowercase, and a digit</small>
            </div>
            <div class="form-group">
                <label for="password_confirm" class="form-group__label">Confirm password</label>
                <input
                    type="password"
                    id="password_confirm"
                    name="password_confirm"
                    class="form-input{% if error %} form-input--error{% endif %}"
                    required
                    minlength="8"
                />
            </div>
            <button type="submit" class="btn btn--primary btn--block">Create admin account</button>
        </form>
    </div>
</body>
</html>
