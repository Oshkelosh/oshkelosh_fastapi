<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Oshkelosh</title>
    <link rel="stylesheet" href="{{ admin_prefix }}/static/admin.css">
</head>
<body class="page-login">
    <div class="login-card">
        <div class="login-card__header">
            <svg class="login-card__logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <h1 class="login-card__title">Oshkelosh Admin</h1>
            <p class="login-card__subtitle">Sign in to manage your store</p>
        </div>

        {% if error %}
        <div class="flash flash--error">
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="{{ admin_prefix }}/login" class="login-form">
            <div class="form-group">
                <label for="email" class="form-group__label">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input{% if error %} form-input--error{% endif %}"
                    placeholder="admin@oshkelosh.com"
                    required
                    autofocus
                />
            </div>
            <div class="form-group">
                <label for="password" class="form-group__label">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input{% if error %} form-input--error{% endif %}"
                    placeholder="••••••••"
                    required
                />
            </div>
            <input type="hidden" name="redirect_to" value="{{ admin_prefix }}/dashboard" />
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
            <button type="submit" class="btn btn--primary btn--block">Sign in</button>
        </form>

        <p class="login-card__footer">
            <a href="/" target="_blank" rel="noopener noreferrer">View storefront</a>
        </p>
    </div>
</body>
</html>
