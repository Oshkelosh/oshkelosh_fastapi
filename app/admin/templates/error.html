{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="empty-state empty-state--error">
    <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    <h2>{{ flash }}</h2>
    <p class="empty-state__text">Something went wrong. Please try again or contact support.</p>
    <a href="{{ admin_prefix }}/dashboard" class="btn btn--primary">Back to Dashboard</a>
</div>
{% endblock %}
